<head>

<title>Vladimir Jaroszewski | Economista</title>

<style>
:root{
--bg:#f4f7fb;
--card:#ffffff;
--text:#1f2933;
--muted:#6b7280;
--primary:#1f4e79;
--primary-soft:#eef4fb;
--line:#d9e2ec;
--shadow:0 8px 24px rgba(0,0,0,0.06);
--radius:14px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family: "Segoe UI", Roboto, Arial, sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.65;
}

.layout{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

/* LEFT MENU */

.sidebar{
background:#102435;
color:white;
padding:28px 22px;
border-right:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
height:100vh;
}

.sidebar h1{
font-size:1.2rem;
margin:0;
}

.sidebar p{
font-size:0.9rem;
color:rgba(255,255,255,0.7);
margin-top:6px;
}

.menu-title{
margin-top:28px;
font-size:0.75rem;
letter-spacing:0.08em;
text-transform:uppercase;
color:rgba(255,255,255,0.5);
}

.menu{
display:grid;
gap:6px;
margin-top:10px;
}

.menu a{
padding:10px 12px;
border-radius:10px;
font-size:0.95rem;
color:rgba(255,255,255,0.85);
}

.menu a:hover{
background:rgba(255,255,255,0.08);
}

/* MAIN CONTENT */

.main{
padding:40px;
max-width:900px;
margin:0 auto;
}

.hero{
background:var(--card);
border:1px solid var(--line);
border-radius:20px;
padding:36px;
box-shadow:var(--shadow);
margin-bottom:24px;
}

.hero h2{
margin:0 0 8px 0;
font-size:1.9rem;
color:var(--primary);
}

.hero p{
margin:0;
color:var(--muted);
}

.section{
background:var(--card);
border:1px solid var(--line);
border-radius:var(--radius);
padding:24px;
box-shadow:var(--shadow);
margin-bottom:20px;
}

.section h3{
margin-top:0;
color:var(--primary);
}

.section p{
color:var(--muted);
}

.links{
display:grid;
gap:12px;
}

.card{
border:1px solid var(--line);
background:#fbfcfe;
padding:16px;
border-radius:10px;
transition:0.2s;
}

.card:hover{
background:var(--primary-soft);
border-color:#bfd0e1;
transform:translateY(-1px);
}

.card strong{
display:block;
margin-bottom:4px;
}

.card span{
font-size:0.9rem;
color:var(--muted);
}

.contact a{
display:inline-block;
margin-right:10px;
margin-top:6px;
padding:8px 12px;
background:var(--primary);
color:white;
border-radius:8px;
font-size:0.9rem;
}

.contact a:hover{
background:#173a5a;
}

.footer{
margin-top:20px;
font-size:0.9rem;
color:var(--muted);
}

@media(max-width:900px){
.layout{grid-template-columns:1fr}
.sidebar{height:auto;position:relative}
.main{padding:26px}
}

</style>
</head>

<body>
</html>
